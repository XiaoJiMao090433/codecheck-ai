<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD需求文档质检 - CodeCheck AI</title>
  <script src="libs/tailwindcss.js"></script>
  <script src="libs/lucide.js"></script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-[#0B1120] text-[#F1F5F9]">
  <div id="app-container" class="ml-[240px] min-h-screen">
    <main class="p-6">
      <!-- 顶部操作栏 -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-xl font-bold">PRD需求文档质检</h1>
          <p class="text-sm text-[#94A3B8] mt-1">上传需求文档，AI自动扫描缺陷、拆解任务并生成测试用例</p>
        </div>
        <div class="flex items-center gap-3">
          <button id="btn-load-demo" class="btn btn-secondary text-sm">
            <i data-lucide="flask-conical" class="w-4 h-4"></i>
            加载演示素材
          </button>
          <button id="btn-analyze" class="btn btn-primary text-sm">
            <i data-lucide="scan-line" class="w-4 h-4"></i>
            开始AI质检
          </button>
          <button id="btn-clear" class="btn btn-danger text-sm">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
            清空
          </button>
        </div>
      </div>

      <!-- 文档输入区 -->
      <div class="grid grid-cols-12 gap-4 mb-6">
        <div class="col-span-5">
          <div class="card flex flex-col p-0" style="height: 320px;">
            <div class="px-4 py-3 border-b border-[#1E293B] flex items-center justify-between">
              <span class="text-sm font-medium">文档输入</span>
              <span class="text-xs text-[#64748B]">支持 Markdown / Word 模拟上传</span>
            </div>
            <textarea id="prd-input" class="flex-1 bg-[#0B1120] text-[#D4D4D4] p-4 text-sm resize-none outline-none border-none" placeholder="在此粘贴PRD文档内容..."></textarea>
          </div>
          <div class="upload-zone mt-3 py-4" id="upload-zone">
            <i data-lucide="upload-cloud" class="w-6 h-6 text-[#64748B] mx-auto mb-1"></i>
            <p class="text-sm text-[#94A3B8]">点击上传需求文档</p>
            <input type="file" id="file-input" class="hidden" accept=".md,.doc,.docx,.txt">
          </div>
        </div>

        <!-- 缺陷标注展示区 -->
        <div class="col-span-7">
          <div class="card p-0" style="height: 400px;">
            <div class="px-4 py-3 border-b border-[#1E293B]">
              <span class="text-sm font-medium">缺陷标注展示</span>
            </div>
            <div id="defect-list" class="p-4 overflow-auto" style="height: calc(400px - 49px);">
              <div class="text-sm text-[#64748B] text-center mt-20">请输入PRD文档或加载演示素材开始质检</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 自动拆解任务 -->
      <div class="mb-6">
        <h2 class="text-base font-semibold mb-4 flex items-center gap-2">
          <i data-lucide="layers" class="w-5 h-5 text-[#8B5CF6]"></i>
          自动拆解开发任务
        </h2>
        <div class="grid grid-cols-3 gap-4" id="task-section">
          <div class="card p-0">
            <div class="px-4 py-3 border-b border-[#1E293B] bg-[#165DFF]/5">
              <span class="text-sm font-medium text-[#60A5FA]">前端任务</span>
            </div>
            <div id="task-frontend" class="p-3 overflow-auto" style="max-height: 260px;">
              <div class="text-xs text-[#64748B] text-center py-6">等待质检结果</div>
            </div>
          </div>
          <div class="card p-0">
            <div class="px-4 py-3 border-b border-[#1E293B] bg-[#10B981]/5">
              <span class="text-sm font-medium text-[#34D399]">后端接口</span>
            </div>
            <div id="task-backend" class="p-3 overflow-auto" style="max-height: 260px;">
              <div class="text-xs text-[#64748B] text-center py-6">等待质检结果</div>
            </div>
          </div>
          <div class="card p-0">
            <div class="px-4 py-3 border-b border-[#1E293B] bg-[#F59E0B]/5">
              <span class="text-sm font-medium text-[#FBBF24]">测试校验点</span>
            </div>
            <div id="task-test" class="p-3 overflow-auto" style="max-height: 260px;">
              <div class="text-xs text-[#64748B] text-center py-6">等待质检结果</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 测试用例生成 -->
      <div class="card p-0">
        <div class="px-4 py-3 border-b border-[#1E293B] flex items-center justify-between">
          <span class="text-sm font-medium">自动生成测试用例</span>
          <button id="btn-copy-cases" class="text-xs text-[#60A5FA] hover:text-[#93C5FD] hidden">复制全部用例</button>
        </div>
        <div id="test-cases" class="p-4 overflow-auto" style="max-height: 300px;">
          <div class="text-sm text-[#64748B] text-center py-10">完成质检后将在此生成测试用例</div>
        </div>
      </div>

      <!-- 加载遮罩 -->
      <div id="loading-overlay" class="modal-overlay">
        <div class="flex flex-col items-center gap-3">
          <div class="loading-spinner"></div>
          <p class="text-sm text-[#94A3B8]">AI正在分析PRD文档...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/prd-check.js"></script>
</body>
</html>
