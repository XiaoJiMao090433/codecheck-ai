<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码智能审查 - CodeCheck AI</title>
  <script src="libs/tailwindcss.js"></script>
  <script src="libs/lucide.js"></script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-[#0B1120] text-[#F1F5F9]">
  <div id="app-container" class="ml-[240px] min-h-screen">
    <main class="p-6 h-[calc(100vh-64px)] flex flex-col">
      <!-- 顶部操作栏 -->
      <div class="flex items-center justify-between mb-4 flex-shrink-0">
        <div>
          <h1 class="text-xl font-bold">代码智能审查</h1>
          <p class="text-sm text-[#94A3B8] mt-1">粘贴代码或上传文件，AI自动识别风险并生成优化建议</p>
        </div>
        <div class="flex items-center gap-3">
          <button id="btn-load-demo" class="btn btn-secondary text-sm">
            <i data-lucide="flask-conical" class="w-4 h-4"></i>
            加载演示素材
          </button>
          <button id="btn-analyze" class="btn btn-primary text-sm">
            <i data-lucide="scan-line" class="w-4 h-4"></i>
            开始AI审查
          </button>
          <button id="btn-clear" class="btn btn-danger text-sm">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
            清空
          </button>
        </div>
      </div>

      <!-- 三栏布局 -->
      <div class="flex-1 grid grid-cols-12 gap-4 min-h-0">
        <!-- 左侧：代码输入 -->
        <div class="col-span-4 flex flex-col gap-3 min-h-0">
          <div class="card flex-1 flex flex-col p-0 overflow-hidden">
            <div class="px-4 py-3 border-b border-[#1E293B] flex items-center justify-between">
              <span class="text-sm font-medium">代码输入</span>
              <span class="text-xs text-[#64748B]">支持 JS / Python / Java / Go</span>
            </div>
            <textarea id="code-input" class="flex-1 bg-[#0B1120] text-[#D4D4D4] p-4 text-sm font-mono resize-none outline-none border-none" placeholder="在此粘贴代码片段..."></textarea>
          </div>
          <!-- 模拟文件上传区 -->
          <div class="upload-zone py-6" id="upload-zone">
            <i data-lucide="upload-cloud" class="w-8 h-8 text-[#64748B] mx-auto mb-2"></i>
            <p class="text-sm text-[#94A3B8]">点击或拖拽上传代码文件</p>
            <p class="text-xs text-[#64748B] mt-1">.js .py .java .go</p>
            <input type="file" id="file-input" class="hidden" accept=".js,.py,.java,.go">
          </div>
        </div>

        <!-- 中部：代码编辑器预览 -->
        <div class="col-span-4 flex flex-col min-h-0">
          <div class="card flex-1 flex flex-col p-0 overflow-hidden">
            <div class="px-4 py-3 border-b border-[#1E293B] flex items-center justify-between">
              <span class="text-sm font-medium">代码预览</span>
              <div class="flex items-center gap-2">
                <span class="tag tag-high text-xs">高危</span>
                <span class="tag tag-medium text-xs">中危</span>
                <span class="tag tag-low text-xs">低危</span>
              </div>
            </div>
            <div id="code-editor" class="code-editor flex-1 p-2 overflow-auto">
              <div class="text-sm text-[#64748B] text-center mt-20">请输入代码或加载演示素材开始审查</div>
            </div>
          </div>
        </div>

        <!-- 右侧：风险与优化 -->
        <div class="col-span-4 flex flex-col gap-3 min-h-0">
          <!-- 风险列表 -->
          <div class="card flex-1 flex flex-col p-0 overflow-hidden">
            <div class="px-4 py-3 border-b border-[#1E293B]">
              <span class="text-sm font-medium">风险检测结果</span>
            </div>
            <div id="risk-list" class="flex-1 overflow-auto p-3">
              <div class="text-sm text-[#64748B] text-center mt-10">暂无检测结果</div>
            </div>
          </div>

          <!-- AI优化输出 -->
          <div class="card flex-1 flex flex-col p-0 overflow-hidden">
            <div class="px-4 py-3 border-b border-[#1E293B] flex items-center justify-between">
              <span class="text-sm font-medium">AI优化代码</span>
              <div class="flex items-center gap-2">
                <button id="btn-gen-fix" class="btn btn-primary text-xs px-3 py-1">
                  <i data-lucide="wand-2" class="w-3 h-3"></i>
                  一键生成
                </button>
                <button id="btn-copy-fix" class="text-xs text-[#60A5FA] hover:text-[#93C5FD] hidden">复制</button>
              </div>
            </div>
            <div id="fix-output" class="flex-1 overflow-auto p-3 bg-[#0B1120]">
              <div class="text-sm text-[#64748B] text-center mt-10">点击「一键生成」或风险项生成优化代码</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- 风险详情弹窗 -->
    <div id="risk-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span id="modal-tag" class="tag"></span>
            <h3 id="modal-title" class="text-base font-semibold"></h3>
          </div>
          <button id="modal-close" class="text-[#64748B] hover:text-white">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="space-y-3 text-sm">
          <div>
            <p class="text-[#94A3B8] mb-1">风险说明</p>
            <p id="modal-reason" class="text-[#F1F5F9] leading-relaxed"></p>
          </div>
          <div>
            <p class="text-[#94A3B8] mb-1">修复建议</p>
            <p id="modal-fix" class="text-[#22C55E] leading-relaxed"></p>
          </div>
        </div>
        <div class="mt-5 flex justify-end">
          <button id="modal-gen-fix" class="btn btn-primary text-sm">生成修复代码</button>
        </div>
      </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="loading-overlay" class="modal-overlay">
      <div class="flex flex-col items-center gap-3">
        <div class="loading-spinner"></div>
        <p class="text-sm text-[#94A3B8]">AI正在分析代码风险...</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/code-review.js"></script>
</body>
</html>
